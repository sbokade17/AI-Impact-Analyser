server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_impact_analyser
    username: ${DB_USERNAME:shubhambokade}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

ai:
  # Set to "mock" for deterministic sample data, "gemini" for the default live Gemini client,
  # or "live" as an explicit alias for the real backend AI call path.
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    fallback-models: ${GEMINI_FALLBACK_MODELS:gemini-2.0-flash,gemini-1.5-flash}
    base-url: https://generativelanguage.googleapis.com/v1beta
    max-retries: ${GEMINI_MAX_RETRIES:3}
    retry-delay-ms: ${GEMINI_RETRY_DELAY_MS:800}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

async:
  analysis:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 50
